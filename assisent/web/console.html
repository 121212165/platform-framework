<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MCP 管理控制台</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/console.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <h1>MCP 管理控制台</h1>
        <div class="header-actions">
          <input id="apiKey" placeholder="X-API-Key" />
          <button id="theme-toggle" type="button">主题</button>
          <div class="status" id="status">准备就绪</div>
        </div>
      </header>
      <main class="console-layout">
        <section class="panel">
          <h2>服务发现</h2>
          <div id="services" class="grid"></div>
        </section>
        <section class="panel">
          <h2>调用配置</h2>
          <div class="form-row">
            <label>服务
              <input id="svc" />
            </label>
            <label>方法
              <select id="method">
                <option>GET</option>
                <option>POST</option>
                <option>PUT</option>
                <option>DELETE</option>
              </select>
            </label>
            <label>路径
              <input id="path" placeholder="/health" />
            </label>
          </div>
          <label>JSON 载荷
            <textarea id="payload" rows="5" placeholder="{}"></textarea>
          </label>
          <div class="actions">
            <button id="invoke">调用</button>
          </div>
          <pre id="result" class="result"></pre>
        </section>
        <section class="panel">
          <h2>监控与日志</h2>
          <div id="stats" class="grid"></div>
          <pre id="logs" class="logs"></pre>
        </section>
      </main>
    </div>
    <script src="/console.js"></script>
  </body>
  </html>
