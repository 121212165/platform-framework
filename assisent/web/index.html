<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>心理支持对话</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <h1>心理支持对话</h1>
        <div class="header-actions">
          <button id="history-toggle" type="button">历史</button>
          <button id="theme-toggle" type="button">主题</button>
          <div class="status" id="status">检查服务...</div>
        </div>
      </header>
      <main class="layout">
        <div id="chat" class="chat" data-area="chat"></div>
        <aside id="history" class="history-panel" data-area="panel">
          <div class="history-controls">
            <input type="date" id="history-date" />
            <input type="text" id="history-search" placeholder="搜索关键词" />
          </div>
          <div id="history-list" class="history-list"></div>
        </aside>
        <form id="form" class="input" data-area="input">
          <textarea id="input" rows="3" placeholder="说说你此刻的感受或想从这次对话得到什么"></textarea>
          <div class="actions">
            <label>模型
              <select id="model">
                <option value="glm-4.6">glm-4.6</option>
              </select>
            </label>
            <label>温度
              <input id="temp" type="number" min="0" max="1" step="0.1" value="0.6" />
            </label>
            <button type="submit">发送</button>
          </div>
        </form>
      </main>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
